security:
  - ApiKeyAuth: []

paths:

  /health:
    get:
      summary: Health Check
      tags:
        - System

      responses:
        "200":
          description: OK

  /api/v1/test:
    get:
      summary: API Connectivity Test
      tags:
        - Test

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: API working

  /api/v1/ef/reference:
    get:
      summary: Get Emission Factor Reference Data
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: Reference data fetched successfully

  /api/v1/ef/dashboard:
    get:
      summary: Get Emission Factor Dashboard
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: Dashboard data fetched successfully

  /api/v1/ef/list:
    get:
      summary: Get Emission Factor List
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: query
          name: searchText
          schema:
            type: string

        - in: query
          name: efType
          schema:
            type: string
            enum:
              - ACTIVITY
              - SPEND

        - in: query
          name: scopeLevel
          schema:
            type: string

        - in: query
          name: isActive
          schema:
            type: boolean

        - in: query
          name: sourceId
          schema:
            type: integer

        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1

        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20

      responses:
        "200":
          description: Emission factor list fetched successfully

  /api/v1/ef/setup:
    get:
      summary: Get Emission Factor Setup Data
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: query
          name: mode
          required: true
          schema:
            type: string
            enum:
              - NEW
              - VIEW
              - EDIT
              - CLONE
              - VERSION

        - in: query
          name: id
          required: false
          schema:
            type: integer

      responses:
        "200":
          description: Setup data fetched successfully

  /api/v1/ef/save:
    post:
      summary: Create or Update Emission Factor
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveEmissionFactorRequest"

      responses:
        "200":
          description: Emission factor saved successfully

        "400":
          description: Validation error

  /api/v1/ef/delete/{id}:
    delete:
      summary: Delete Emission Factor
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        "200":
          description: Emission factor deleted successfully

        "400":
          description: Invalid factor

  /api/v1/temp/processmaster/{industryId}:
    get:
      summary: Get Process Category Master
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: path
          name: industryId
          required: true
          schema:
            type: integer
          description: Industry ID

        - in: query
          name: includeProcesses
          required: false
          schema:
            type: boolean
            default: false
          description: When true, includes all process master records under their matching process category.

      responses:
        "200":
          description: Process category master data fetched successfully. Includes process master data when includeProcesses is true.

        "400":
          description: Invalid industryId supplied
