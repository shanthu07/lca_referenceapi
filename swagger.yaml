    #     sourceID:
    #       type: integer
    #       nullable: true

    #     processID:
    #       type: integer
    #       nullable: true

    #     industryID:
    #       type: integer
    #       nullable: true

    #     productID:
    #       type: integer
    #       nullable: true

    #     isCompositeFactor:
    #       type: boolean
    #       example: false

    #     note:
    #       type: string
    #       nullable: true

    #     effectiveFrom:
    #       type: string
    #       format: date

    #     effectiveTo:
    #       type: string
    #       format: date
    #       nullable: true

    #     isActive:
    #       type: boolean
    #       example: true

    #     mix:
    #       type: array
    #       items:
    #         $ref: "#/components/schemas/EmissionFactorMix"

    Scenario:
      type: object
      properties:
        ScenarioId:
          type: integer
          example: 12
        TenantId:
          type: integer
          example: 1
        UserId:
          type: integer
          example: 5
        ScenarioName:
          type: string
          example: Scenario 1
        Description:
          type: string
          nullable: true
          example: Testing alternate energy usage
        Ext1:
          type: string
          nullable: true
        Ext2:
          type: string
          nullable: true
        Ext3:
          type: string
          nullable: true
        Ext4:
          type: string
          nullable: true
        Ext5:
          type: string
          nullable: true
        CreatedOn:
          type: string
          format: date-time
        ModifiedOn:
          type: string
          format: date-time

    CreateScenarioRequest:
      type: object
      required:
        - scenarioName
      properties:
        scenarioName:
          type: string
          example: Scenario 1
        description:
          type: string
          nullable: true
          example: Testing alternate energy usage
        ext1:
          type: string
          nullable: true
        ext2:
          type: string
          nullable: true
        ext3:
          type: string
          nullable: true
        ext4:
          type: string
          nullable: true
        ext5:
          type: string
          nullable: true

    ScenarioProcessInput:
      type: object
      required:
        - processId
      properties:
        processId:
          type: integer
          example: 101
        amount:
          type: number
          nullable: true
          example: 250
        activityDescription:
          type: string
          nullable: true
          example: Monthly electricity consumption

    SaveScenarioProcessRequest:
      allOf:
        - $ref: "#/components/schemas/CreateScenarioRequest"
        - type: object
          properties:
            scenarioId:
              type: integer
              nullable: true
              example: 12
            processId:
              type: integer
              example: 101
            amount:
              type: number
              nullable: true
              example: 250
            activityDescription:
              type: string
              nullable: true
              example: Monthly electricity consumption
      description: Send scenarioId when updating an existing scenario. Send scenarioName when creating a scenario during the first process save.

    SaveScenarioProcessesBulkRequest:
      allOf:
        - $ref: "#/components/schemas/CreateScenarioRequest"
        - type: object
          required:
            - processes
          properties:
            scenarioId:
              type: integer
              nullable: true
              example: 12
            processes:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ScenarioProcessInput"
      description: Send scenarioId when updating an existing scenario. Send scenarioName when creating a scenario during the first bulk save.

security:
  - ApiKeyAuth: []

paths:

  /health:
    get:
      summary: Health Check
      tags:
        - System

      responses:
        "200":
          description: OK

  /api/v1/test:
    get:
      summary: API Connectivity Test
      tags:
        - Test

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: API working

  /api/v1/ef/reference:
    get:
      summary: Get Emission Factor Reference Data
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: Reference data fetched successfully

  /api/v1/ef/dashboard:
    get:
      summary: Get Emission Factor Dashboard
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      responses:
        "200":
          description: Dashboard data fetched successfully

  /api/v1/ef/list:
    get:
      summary: Get Emission Factor List
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: query
          name: searchText
          schema:
            type: string

        - in: query
          name: efType
          schema:
            type: string
            enum:
              - ACTIVITY
              - SPEND

        - in: query
          name: scopeLevel
          schema:
            type: string

        - in: query
          name: isActive
          schema:
            type: boolean

        - in: query
          name: sourceId
          schema:
            type: integer

        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1

        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20

      responses:
        "200":
          description: Emission factor list fetched successfully

  /api/v1/ef/setup:
    get:
      summary: Get Emission Factor Setup Data
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: query
          name: mode
          required: true
          schema:
            type: string
            enum:
              - NEW
              - VIEW
              - EDIT
              - CLONE
              - VERSION

        - in: query
          name: id
          required: false
          schema:
            type: integer

      responses:
        "200":
          description: Setup data fetched successfully

  /api/v1/ef/save:
    post:
      summary: Create or Update Emission Factor
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveEmissionFactorRequest"

      responses:
        "200":
          description: Emission factor saved successfully

        "400":
          description: Validation error

  /api/v1/ef/delete/{id}:
    delete:
      summary: Delete Emission Factor
      tags:
        - Emission Factor

      security:
        - ApiKeyAuth: []

      parameters:

        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        "200":
          description: Emission factor deleted successfully

        "400":
          description: Invalid factor

  /api/v1/temp/processmaster/{industryId}:
    get:
      summary: Get Process Category Master
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: path
          name: industryId
          required: true
          schema:
            type: integer
          description: Industry ID

        - in: query
          name: includeProcesses
          required: false
          schema:
            type: boolean
            default: false
          description: When true, includes all process master records under their matching process category.

      responses:
        "200":
          description: Process category master data fetched successfully. Includes process master data when includeProcesses is true.

        "400":
          description: Invalid industryId supplied

  /api/v1/temp/myprocess:
    get:
      summary: Get My Process
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      responses:
        "200":
          description: My Process data fetched successfully

        "400":
          description: tenantId and userId are required

    post:
      summary: Add My Process
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - processId
              properties:
                processId:
                  type: integer
                  example: 1
                activityDescription:
                  type: string
                  example: Electricity consumption for production line

      responses:
        "200":
          description: Process added successfully or already exists

        "400":
          description: tenantId, userId and processId are required

    delete:
      summary: Delete My Process
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - processId
              properties:
                processId:
                  type: integer
                  example: 1

      responses:
        "200":
          description: Process deleted successfully or not found

        "400":
          description: tenantId, userId and processId are required

  /api/v1/temp/scenario:
    get:
      summary: Get My Scenarios
      description: Returns all scenarios created by the tenant/user.
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      responses:
        "200":
          description: Scenarios fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Scenarios fetched successfully
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Scenario"

        "400":
          description: tenantId and userId are required

    post:
      summary: Create Scenario
      description: Creates only the scenario header in LCA_MyScenario. For normal save flow, UI can use scenario-process or scenario-process/bulk directly with scenarioName.
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioRequest"
            example:
              scenarioName: Scenario 1
              description: Testing alternate energy usage

      responses:
        "201":
          description: Scenario created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Scenario created successfully
                  data:
                    $ref: "#/components/schemas/Scenario"

        "400":
          description: tenantId, userId and scenarioName are required

  /api/v1/temp/scenario-process:
    post:
      summary: Save Scenario Process
      description: Saves one process under a scenario. If scenarioId is not sent, scenarioName is required and a new scenario is created first. If the same process already exists for the scenario, amount and activityDescription are updated.
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveScenarioProcessRequest"
            examples:
              createScenarioAndSaveFirstProcess:
                summary: First save creates scenario and saves one process
                value:
                  scenarioName: Scenario 1
                  description: Testing alternate energy usage
                  processId: 101
                  amount: 250
                  activityDescription: Monthly electricity consumption
              updateExistingScenarioProcess:
                summary: Update or insert one process in an existing scenario
                value:
                  scenarioId: 12
                  processId: 101
                  amount: 300
                  activityDescription: Updated electricity consumption

      responses:
        "200":
          description: Scenario process saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Scenario process saved successfully
                  data:
                    type: object
                    properties:
                      scenarioId:
                        type: integer
                        example: 12
                      processId:
                        type: integer
                        example: 101

        "400":
          description: tenantId, userId, processId, and either scenarioId or scenarioName are required

        "404":
          description: Scenario not found

  /api/v1/temp/scenario-process/bulk:
    post:
      summary: Save Scenario Processes Bulk
      description: Saves one or more processes under a scenario in a transaction. If scenarioId is not sent, scenarioName is required and a new scenario is created first. Existing scenario process rows are updated; missing rows are inserted.
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveScenarioProcessesBulkRequest"
            examples:
              createScenarioAndSaveMultipleProcesses:
                summary: First save creates scenario and saves multiple processes
                value:
                  scenarioName: Scenario 1
                  description: Testing alternate energy usage
                  processes:
                    - processId: 101
                      amount: 250
                      activityDescription: Monthly electricity consumption
                    - processId: 102
                      amount: 80
                      activityDescription: Diesel usage
              updateExistingScenarioProcesses:
                summary: Update or insert multiple processes in an existing scenario
                value:
                  scenarioId: 12
                  processes:
                    - processId: 101
                      amount: 300
                      activityDescription: Updated electricity consumption
                    - processId: 102
                      amount: 90
                      activityDescription: Updated diesel usage

      responses:
        "200":
          description: Scenario processes saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Scenario processes saved successfully
                  data:
                    type: object
                    properties:
                      scenarioId:
                        type: integer
                        example: 12
                      savedCount:
                        type: integer
                        example: 2

        "400":
          description: tenantId, userId, processes, and either scenarioId or scenarioName are required

        "404":
          description: Scenario not found

  /api/v1/temp/scenario-process/details:
    get:
      summary: Get Scenario Details
      description: Returns scenario process rows. Pass scenarioId to fetch one scenario; omit scenarioId to fetch all scenario process rows for the tenant/user.
      tags:
        - Scenario Analysis

      security:
        - ApiKeyAuth: []

      parameters:

        - in: query
          name: tenantId
          required: true
          schema:
            type: integer
          description: Tenant ID

        - in: query
          name: userId
          required: true
          schema:
            type: integer
          description: User ID

        - in: query
          name: scenarioId
          required: false
          schema:
            type: integer
          description: Scenario ID. Optional. When omitted, all scenario process rows for tenant/user are returned.

      responses:
        "200":
          description: Scenario details fetched successfully

        "400":
          description: tenantId and userId are required
