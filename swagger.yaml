    #     scopeLevel:
    #       type: string
    #       enum:
    #         - GLOBAL
    #         - REGION
    #         - COUNTRY
    #         - STATE
    #         - CITY
    #         - TENANT

    #     regionID:
    #       type: integer
    #       nullable: true

    #     countryID:
    #       type: integer
    #       nullable: true

    #     stateID:
    #       type: integer
