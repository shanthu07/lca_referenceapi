openapi: 3.0.0

info:
  title: LCA Reference API
  version: 1.0.0
  description: API documentation for Emission Factor Module

servers:
  - url: http://localhost:5001
    description: Local

  - url: https://serviceapi.greenesteplca.com
    description: Production

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:

    # SuccessResponse:
