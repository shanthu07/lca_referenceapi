    #         - ACTIVITY
    #         - SPEND

    #     efCO2:
    #       type: number
    #       example: 2.67

    #     efCH4:
    #       type: number
    #       example: 0.0001

    #     efN2O:
    #       type: number
    #       example: 0.0002

    #     efCO2e:
    #       type: number
    #       example: 2.68

    #     efUnitID:
    #       type: integer
    #       nullable: true

    #     currencyCode:
    #       type: string
